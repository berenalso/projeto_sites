<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Bernardo Libardi</title>
</head>
<body>

    
    <header>
        <h1>Bernardo Libardi</h1>
        <p>Olá! Seja bem-vindo ao meu portfólio</p>
    
    </header>
<hr>
    <main>
        <section id="sobre">
            <h2>Sobre Mim</h2>
            <p>
                Sou estudante do <strong>Cimol</strong> e estou desenvolvendo habilidades em 
                <strong>HTML</strong>, <strong>CSS</strong> e <strong>Git</strong> 
                busco sempre aplicar o <em>clean code</em> em meus projetos
            </p>
        </section>
<hr>
        <section id="contato">
            <h2>Entre em Contato</h2>
            <form action="#">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
                <br><br>

                <p>Área de Interesse:</p>
                <input type="radio" id="front" name="interesse" value="Front-end">
                <label for="front">Front-end</label><br>
                <input type="radio" id="back" name="interesse" value="Back-end">
                <label for="back">Back-end</label><br>
                <input type="radio" id="full" name="interesse" value="Full-stack">
                <label for="full">Full-stack</label>
                <br>

                <p>Habilidades:</p>
                <input type="checkbox" id="html" name="habilidade" value="HTML">
                <label for="html">HTML</label><br>
                <input type="checkbox" id="c" name="habilidade" value="C">
                <label for="c">C</label><br>
                <input type="checkbox" id="git" name="habilidade" value="Git">
                <label for="git">Git</label><br>
                <input type="checkbox" id="redes" name="habilidade" value="Redes">
                <label for="redes">Redes</label>
                <br><br>

                <button type="submit">Enviar Dados</button>
            </form>
        </section>
    </main>
<hr>
    <footer>
        <p><a href="https://github.com/berenalso" target="_blank">Perfil no GitHub</a></p>
    </footer>

</body>
</html>
